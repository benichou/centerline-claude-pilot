# Pre-commit hooks. Install once:  uv run pre-commit install
# Run on all files:                uv run pre-commit run --all-files
#
# Python tooling (black, flake8) runs via `uv run` so the versions come from uv.lock (single source of
# truth — same versions locally and anywhere). The hygiene hooks below are language-agnostic and managed
# by the pre-commit framework itself.
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^(data|reference)/'
      - id: end-of-file-fixer
        exclude: '^(data|reference)/'
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files

  - repo: local
    hooks:
      - id: black
        name: black (uv)
        entry: uv run black
        language: system
        types: [python]
      - id: flake8
        name: flake8 (uv)
        entry: uv run flake8
        language: system
        types: [python]
